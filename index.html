<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1c160f">
<title>福慧學習護照</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap');

:root{
  --gold:#b38d28;    --gold-l:#c9a94a;  --gold-p:#fdf3d8;
  --ink:#1c160f;     --ink-m:#3d3220;   --ink-l:#6b5c3e;
  --paper:#ffffff;   --paper-d:#f8f4ed;
  --green:#2e7d4f;   --green-l:#e6f5ec;
  --border:#c8b48a;  --red:#a62c2b;  --zen-red:#a62c2b;
  --shadow:0 2px 8px rgba(26,18,8,.06);
  --r:16px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{font-size:16px;-webkit-text-size-adjust:100%;text-size-adjust:100%;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--paper-d);color:var(--ink);max-width:600px;margin:0 auto;font-size:16px;}

.app{width:100%;background:var(--paper);}
.page{display:none;}
.page.active{display:block;}

/* NAV — 普通文件流，跟著內容走 */
.bottom-nav{background:var(--ink);border-top:3px solid var(--gold);display:flex;}
.nav-btn{flex:1;padding:14px 8px 18px;background:none;border:none;color:#8a7a5a;font-family:'Noto Serif TC',serif;font-size:14px;letter-spacing:1px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;transition:color .2s;}
.nav-btn .ni{font-size:24px;line-height:1;}
.nav-btn.active{color:var(--gold-l);}

/* HEADER */
.app-header{flex-shrink:0;background:var(--ink);padding:16px 18px 14px;border-bottom:3px solid var(--gold);}
.header-row{display:flex;justify-content:space-between;align-items:center;}
.app-title{font-family:'Noto Serif TC',serif;color:var(--gold-l);font-size:20px;letter-spacing:3px;font-weight:700;text-shadow:0.5px 0.5px 0 rgba(255,255,255,.2);}
.week-chip{background:var(--gold);color:#fff;font-size:13px;font-weight:600;padding:5px 14px;border-radius:20px;letter-spacing:1px;}

/* MILESTONE */
.ms-strip{flex-shrink:0;background:var(--ink);border-bottom:2px solid var(--gold);padding:8px 16px;}
.ms-track{display:flex;align-items:center;justify-content:center;gap:6px;}
.ms-badge{
  display:flex;align-items:center;gap:5px;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(212,170,74,.3);
  border-radius:20px;padding:5px 10px;
  font-family:'Noto Serif TC',serif;
}
.ms-badge.done{background:rgba(196,154,46,.2);border-color:var(--gold);}
.ms-badge.cur{background:rgba(196,154,46,.15);border-color:var(--gold-l);animation:pulse 2s ease-in-out infinite;}
.ms-icon{font-size:15px;line-height:1;}
.ms-lbl{font-size:11px;color:var(--gold-p);opacity:.7;line-height:1.2;font-weight:500;}
.ms-lbl.done{color:var(--gold-l);opacity:1;font-weight:700;}
.ms-sep{width:16px;height:1px;background:rgba(212,170,74,.3);flex-shrink:0;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(196,154,46,.4);}50%{box-shadow:0 0 0 6px rgba(196,154,46,0);}}

/* GROUP RING */
.group-stats{flex-shrink:0;background:#fff;border-bottom:2px solid var(--border);padding:18px 16px 14px;}
.stats-title{font-family:'Noto Serif TC',serif;font-size:13px;letter-spacing:3px;color:var(--ink-l);text-align:center;margin-bottom:14px;font-weight:600;}
.group-ring-wrap{position:relative;width:130px;height:130px;margin:0 auto;}
.group-ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;}
.group-ring-pct{font-family:'Noto Serif TC',serif;font-size:32px;font-weight:700;color:var(--gold);line-height:1;transition:color .5s;}
.group-ring-pct.high{color:var(--green);}
.group-ring-lbl{font-size:12px;color:var(--ink-l);letter-spacing:1px;font-weight:500;}

/* QUOTE */
.wall-quote{
  flex-shrink:0;
  background:var(--gold-p);
  background-image:url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M11 18c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm42 63c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm35-26c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zM9 81c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm68-23c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zM27 1c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm13 54c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z' fill='%23c8b48a' fill-opacity='0.15' fill-rule='evenodd'/%3E%3C/svg%3E");
  padding:20px 24px;
  border-bottom:2px solid var(--border);
  text-align:center;
  position:relative;
}
.wall-quote::before{
  content:'"';
  font-family:'Noto Serif TC',serif;
  font-size:50px;
  color:var(--gold-l);
  opacity:.3;
  position:absolute;
  top:-5px;left:15px;
}
.wall-quote-title{
  font-family:'Noto Serif TC',serif;
  font-size:14px;font-weight:700;
  color:var(--gold);
  letter-spacing:4px;
  margin-bottom:10px;
}
.wall-quote p{
  font-family:'Noto Serif TC',serif;
  font-size:17px;line-height:1.5;
  color:var(--ink-m);
  letter-spacing:2px;
  position:relative;z-index:1;
}

/* MEMBER CARDS */
.wall-scroll{background:var(--paper-d);}
.wall-loading{text-align:center;padding:50px;color:var(--ink-l);font-family:'Noto Serif TC',serif;letter-spacing:1px;font-size:16px;}
.mem-card{background:transparent;margin-bottom:10px;cursor:pointer;}
.mem-card:active .mem-head{border-color:var(--gold);}
.mem-head{background:#fff;padding:14px 16px;display:flex;align-items:center;gap:12px;border-radius:var(--r);border:2px solid var(--border);box-shadow:var(--shadow);transition:border-color .2s;}
.mem-av{width:46px;height:46px;border-radius:50%;background:var(--gold);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Noto Serif TC',serif;font-size:18px;font-weight:700;flex-shrink:0;}
.mem-info{flex:1;min-width:0;}
.mem-name-row{display:flex;align-items:baseline;gap:10px;}
.mem-name{font-family:'Noto Serif TC',serif;font-size:18px;letter-spacing:1px;font-weight:700;color:var(--ink);}
.mem-dharma{font-size:13px;color:var(--ink-l);font-weight:500;}
.mem-week-row{margin-top:8px;display:flex;align-items:center;gap:8px;}
.mem-wlbl{font-size:12px;color:var(--ink-m);white-space:nowrap;font-weight:600;}
.mem-wbar{flex:1;height:8px;background:var(--paper-d);border-radius:4px;overflow:hidden;border:1px solid var(--border);}
.mem-wfill{height:100%;background:var(--gold-l);border-radius:4px;}
.mem-wfill.wdone{background:var(--green);}
.mem-wpct{font-size:13px;font-weight:700;color:var(--gold);min-width:38px;text-align:right;}
.mem-wpct.wdone{color:var(--green);}
.mem-right{text-align:right;min-width:80px;padding-left:12px;border-left:2px solid var(--border);}
.mem-pct{font-family:'Noto Serif TC',serif;font-size:28px;font-weight:700;color:var(--gold);line-height:1;}
.mem-pct.high{color:var(--green);}
.mem-plbl{font-size:12px;color:var(--ink-l);margin-top:3px;font-weight:500;}
.mem-arr{font-size:13px;color:var(--ink-l);margin-top:3px;}
.wall-loading{text-align:center;padding:50px;color:var(--ink-l);font-family:'Noto Serif TC',serif;letter-spacing:1px;font-size:16px;}

/* DETAIL PAGE */
.detail-hdr{flex-shrink:0;background:var(--ink);padding:14px 18px;display:flex;align-items:center;gap:14px;border-bottom:3px solid var(--gold);}
.back-btn{background:none;border:none;color:var(--gold-l);font-size:26px;cursor:pointer;padding:0 6px;line-height:1;}
.detail-title{font-family:'Noto Serif TC',serif;color:var(--gold-l);font-size:18px;letter-spacing:2px;flex:1;font-weight:600;}
.detail-user{flex-shrink:0;background:var(--paper-d);border-bottom:2px solid var(--border);padding:16px 18px;display:flex;align-items:center;gap:14px;}
.detail-av{width:54px;height:54px;border-radius:50%;background:var(--gold);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Noto Serif TC',serif;font-size:22px;font-weight:700;flex-shrink:0;}
.detail-nm{font-family:'Noto Serif TC',serif;font-size:20px;letter-spacing:2px;font-weight:700;}
.detail-dh{font-size:14px;color:var(--ink-l);margin-top:3px;font-weight:500;}
.detail-pcts{margin-left:auto;text-align:right;}
.detail-cpct{font-family:'Noto Serif TC',serif;font-size:28px;font-weight:700;color:var(--gold);}
.detail-cpct.high{color:var(--green);}
.detail-clbl{font-size:12px;color:var(--ink-l);font-weight:500;}
.detail-wrow{margin-top:4px;display:flex;align-items:center;gap:6px;justify-content:flex-end;}
.detail-wpct{font-size:14px;font-weight:700;color:var(--gold);}
.detail-wpct.wdone{color:var(--green);}
.detail-wlbl{font-size:12px;color:var(--ink-l);font-weight:500;}
.detail-scroll{flex:1;overflow-y:auto;padding-bottom:10px;background:var(--paper-d);}
.sec-title{font-family:'Noto Serif TC',serif;font-size:13px;letter-spacing:2px;color:var(--ink-l);padding:14px 18px 8px;display:flex;align-items:center;gap:10px;font-weight:600;}
.sec-title::after{content:'';flex:1;height:2px;background:var(--border);}
.sec-tag{font-size:11px;padding:2px 8px;border-radius:8px;color:#fff;font-weight:600;}
.sec-tag.c{background:var(--green);}
.sec-tag.a{background:var(--ink-l);}
.d-grid{display:flex;flex-direction:column;gap:2px;background:var(--border);}
.d-cell{background:#fff;padding:14px 16px;}
.d-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.d-name{font-size:15px;color:var(--ink-m);font-weight:600;}
.d-pct{font-size:17px;font-weight:700;color:var(--gold);}
.d-pct.full{color:var(--green);}
.d-pct.adm{color:var(--ink-l);}
.d-bar{height:9px;background:var(--paper-d);border-radius:4px;overflow:hidden;margin-bottom:7px;}
.d-bfill{height:100%;background:var(--gold-l);border-radius:4px;}
.d-bfill.full{background:var(--green);}
.d-bfill.adm{background:#bbb;}
.d-count{font-size:13px;color:var(--ink-l);font-weight:500;}
.d-wk{font-size:12px;color:var(--gold);margin-top:4px;font-weight:600;}
.d-wk.wdone{color:var(--green);}

/* CHECKIN STICKY */
.checkin-sticky{background:var(--ink);border-bottom:3px solid var(--gold);padding:12px 18px;}
.cs-user-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.user-block{display:flex;align-items:center;gap:12px;}
.user-av{width:42px;height:42px;border-radius:50%;background:var(--gold);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Noto Serif TC',serif;font-size:17px;font-weight:700;flex-shrink:0;}
.user-name{font-family:'Noto Serif TC',serif;font-size:18px;letter-spacing:1px;color:#fff;font-weight:700;}
.user-dharma{font-size:13px;color:var(--gold-p);opacity:.9;font-weight:500;}
.logout-btn{background:none;border:2px solid var(--gold-l);color:var(--gold-l);font-size:13px;font-weight:600;padding:6px 14px;border-radius:20px;cursor:pointer;letter-spacing:1px;white-space:nowrap;}
.cs-week-row{display:flex;align-items:baseline;gap:10px;margin-bottom:10px;}
.cs-wlbl{font-family:'Noto Serif TC',serif;font-size:15px;color:var(--gold-l);letter-spacing:1px;font-weight:700;}
.cs-wrange{font-size:13px;color:var(--gold-p);opacity:.85;font-weight:500;}
.cs-bars{display:flex;flex-direction:column;gap:7px;}
.cs-bar-row{display:flex;align-items:center;gap:10px;}
.cs-blbl{font-size:13px;color:var(--gold-p);white-space:nowrap;min-width:30px;font-family:'Noto Serif TC',serif;font-weight:600;}
.cs-bbg{flex:1;height:10px;background:rgba(255,255,255,.2);border-radius:5px;overflow:hidden;}
.cs-bfill{height:100%;border-radius:5px;transition:width .8s;}
.cs-bfill.cum{background:var(--gold-l);}
.cs-bfill.wk{background:rgba(255,255,255,.4);}
.cs-bpct{font-size:14px;font-weight:700;color:var(--gold-l);min-width:40px;text-align:right;}
.cs-bpct.wk{color:var(--gold-p);font-size:13px;}

/* ITEM CARDS */
.checkin-scroll{background:var(--paper-d);}
.items-wrap{padding:12px 12px 4px;}
.item-card{background:#fff;border:1px solid rgba(200,180,138,.4);border-radius:var(--r);margin-bottom:14px;overflow:hidden;box-shadow:0 2px 8px rgba(26,18,8,.05);transition:border-color .25s;}
.item-card.done-card{border-color:var(--gold);border-width:2px;background:linear-gradient(to bottom right,#ffffff,var(--gold-p));}
.item-top{padding:16px 16px 6px;display:flex;align-items:center;justify-content:space-between;}
.item-left{display:flex;align-items:center;gap:12px;}
.item-icon{width:44px;height:44px;border-radius:12px;background:var(--gold-p);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;transition:background .25s;}
.item-icon.done{background:var(--green-l);}
.iname{font-family:'Noto Serif TC',serif;font-size:17px;letter-spacing:1px;font-weight:700;color:var(--ink);}
.ihint{font-size:12px;color:var(--ink-l);margin-top:3px;font-weight:500;}
.item-right{text-align:right;}
.item-wpct{font-size:15px;font-weight:700;color:var(--gold);}
.item-wpct.full{color:var(--green);}
.item-wcount{font-size:12px;color:var(--ink-l);margin-top:2px;font-weight:500;}
.item-cpct{font-size:12px;color:var(--ink-l);margin-top:2px;font-weight:500;}
.item-cpct.ahead{color:var(--green);font-weight:700;}
.item-bar{padding:0 16px 4px;}
.bar-bg{height:8px;background:var(--paper-d);border-radius:4px;overflow:hidden;border:1px solid var(--border);}
.bar-fill{height:100%;background:var(--gold-l);border-radius:4px;transition:width .5s;}
.bar-fill.full{background:var(--green);}

/* STEPPER */
.stepper{padding:10px 16px 12px;display:flex;align-items:center;justify-content:center;gap:0;}
.step-btn{width:62px;height:62px;border-radius:50%;border:3px solid var(--border);background:var(--paper-d);font-size:30px;color:var(--ink-m);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:all .15s;user-select:none;font-weight:700;}
.step-btn:active{background:var(--gold-p);border-color:var(--gold);transform:scale(.94);}
.step-btn:disabled{opacity:.2;cursor:not-allowed;}
.step-display{flex:1;text-align:center;display:flex;flex-direction:column;align-items:center;gap:2px;}
.step-num{font-family:'Noto Sans TC',sans-serif;font-size:52px;font-weight:700;color:var(--border);line-height:1;transition:color .2s;letter-spacing:-1px;}
.step-num.has{color:var(--ink);}
.step-num.done{color:var(--green);}
.step-unit{font-size:13px;color:var(--ink-l);letter-spacing:1px;font-weight:600;}

/* NOTE */
.item-note{padding:0 16px 10px;}
.item-note textarea{width:100%;border:2px solid var(--border);border-radius:12px;padding:10px 14px;font-size:15px;font-family:'Noto Sans TC',sans-serif;color:var(--ink);background:var(--paper-d);outline:none;resize:none;line-height:1.7;transition:border-color .2s;font-weight:500;}
.item-note textarea::placeholder{color:#bbb;}
.item-note textarea:focus{border-color:var(--gold);background:#fff;}
.item-fb{padding:0 16px 10px;display:flex;justify-content:space-between;align-items:center;min-height:24px;}
.fb-msg{font-size:14px;color:var(--green);font-family:'Noto Serif TC',serif;opacity:0;transition:opacity .3s;font-weight:700;}
.fb-msg.show{opacity:1;}
.fb-accum{font-size:13px;color:var(--ink-l);font-weight:500;}

/* ADV */
.adv-wrap{margin:0 12px 14px;}
.adv-block{background:#fff;border:2px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow);}
.adv-head{background:var(--paper-d);padding:13px 16px;display:flex;align-items:center;gap:10px;border-bottom:2px solid var(--border);}
.adv-head-title{font-family:'Noto Serif TC',serif;font-size:14px;letter-spacing:2px;color:var(--ink-m);font-weight:700;}
.adv-tag{font-size:11px;background:var(--ink-l);color:#fff;padding:3px 10px;border-radius:8px;font-weight:600;}
.adv-item{display:flex;align-items:center;padding:14px 16px;border-top:1px solid var(--paper-d);}
.adv-left{flex:1;}
.adv-name{font-size:15px;color:var(--ink-m);font-family:'Noto Serif TC',serif;letter-spacing:.5px;font-weight:600;}
.adv-sub{font-size:13px;color:var(--ink-l);margin-top:3px;font-weight:500;}
.adv-bar{height:5px;background:var(--paper-d);border-radius:3px;overflow:hidden;margin-top:6px;width:80%;}
.adv-bfill{height:100%;background:#bbb;border-radius:3px;}
.adv-val{font-size:14px;color:var(--ink-l);min-width:40px;text-align:right;font-weight:600;}

/* VOW REF */
.vow-ref{margin:0 16px 8px;border-radius:10px;overflow:hidden;border:1px solid var(--border);}
.vow-ref-toggle{padding:10px 14px;background:var(--gold-p);cursor:pointer;font-family:'Noto Serif TC',serif;font-size:13px;color:var(--gold);font-weight:700;letter-spacing:1px;user-select:none;}
.vow-ref-body{background:#fffdf5;padding:12px 14px;display:flex;flex-direction:column;gap:12px;}
.vow-item{}
.vow-title{font-family:'Noto Serif TC',serif;font-size:13px;font-weight:700;color:var(--ink-m);margin-bottom:5px;display:flex;align-items:center;gap:8px;}
.vow-count{font-size:11px;background:var(--gold);color:#fff;padding:2px 8px;border-radius:10px;font-weight:600;letter-spacing:.5px;}
.vow-text{font-family:'Noto Serif TC',serif;font-size:14px;color:var(--ink);line-height:2;letter-spacing:1px;}

/* NOTES */
.notes-wrap{padding:8px 14px 4px;}
.notes-loading{text-align:center;padding:16px;font-size:13px;color:var(--ink-l);}
.notes-empty{text-align:center;padding:16px;font-size:13px;color:var(--ink-l);font-family:'Noto Serif TC',serif;letter-spacing:1px;}
.note-item{background:#fff;border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px;}
.note-meta{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.note-icon{font-size:14px;}
.note-label{font-family:'Noto Serif TC',serif;font-size:12px;color:var(--ink-m);font-weight:700;}
.note-date{font-size:11px;color:var(--ink-l);margin-left:auto;font-weight:500;}
.note-text{font-family:'Noto Serif TC',serif;font-size:14px;color:var(--ink);line-height:1.8;letter-spacing:.5px;}

/* SUBMIT */
.submit-wrap{padding:8px 16px 16px;flex-shrink:0;}
.submit-btn{width:100%;border:none;border-radius:var(--r);padding:18px;font-family:'Noto Serif TC',serif;font-size:18px;letter-spacing:4px;cursor:pointer;transition:all .2s;background:#ccc;color:#fff;font-weight:700;}
.submit-btn:disabled{opacity:.5;cursor:not-allowed;background:#ccc;}
.submit-btn.active{background:var(--gold);color:#fff;box-shadow:0 6px 24px rgba(196,154,46,.45);}
.footer{text-align:center;font-size:12px;color:var(--ink-l);padding:8px 16px 12px;opacity:.7;letter-spacing:1px;}

/* LOGIN */
#loginOverlay{position:fixed;inset:0;background:rgba(20,14,4,.97);z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);}
#loginOverlay.hidden{display:none;}
.login-logo{font-family:'Noto Serif TC',serif;color:var(--gold-l);font-size:18px;letter-spacing:3px;margin-bottom:4px;text-align:center;font-weight:700;}
.login-tagline{font-size:12px;color:var(--gold-p);letter-spacing:2px;opacity:.7;margin-bottom:18px;text-align:center;}
.login-box{background:#fff;border-radius:18px;padding:22px 20px;width:100%;max-width:320px;box-shadow:0 16px 48px rgba(0,0,0,.6);}
.login-title{font-family:'Noto Serif TC',serif;font-size:16px;text-align:center;letter-spacing:2px;margin-bottom:5px;color:var(--ink);font-weight:700;}
.login-sub{text-align:center;font-size:13px;color:var(--ink-l);margin-bottom:14px;font-weight:500;}
/* PIN input */
#pinInput:focus{border-color:var(--gold)!important;box-shadow:0 0 0 3px rgba(179,141,40,.12);background:#fff!important;}
/* 登入按鈕 */

<body>
<div class="app">

  <!-- PAGE 2: 個人詳細 -->

    <div class="detail-hdr">

      <div id="detailNotes" class="notes-wrap"></div>
      <div style="padding:16px 16px 32px;">
        <button onclick="closeDetail()" style="
          width:100%;height:50px;border-radius:50px;
          background:var(--ink);color:var(--gold-l);
          border:2px solid var(--gold);
          font-size:15px;font-family:'Noto Serif TC',serif;
          font-weight:600;letter-spacing:2px;cursor:pointer;
          box-shadow:0 4px 16px rgba(28,22,15,.3);
          display:flex;align-items:center;justify-content:center;gap:8px;
        ">← 回功德榜</button>

  <!-- PAGE 3: 打卡 -->
  <div id="pageCheckin" class="page">
    <div class="checkin-sticky">
      <div class="cs-user-row">
        <div class="user-block">
          <div class="user-av" id="userAv">—</div>
          <div><div class="user-name" id="userName">—</div><div class="user-dharma" id="userDharma">—</div></div>

      <div class="cs-bars">

</div>

<!-- 浮動打卡按鈕（功德榜頁顯示） -->

">← 功德榜</button>

<!-- Login -->

  <div class="login-tagline">立願啟行 · 個人修學記錄</div>

    <div class="login-title">修學打卡</div>

      inputmode="numeric" pattern="[0-9]*"

      oninput="onPinInput(this)"

</div>

<div class="toast" id="toast"></div>

<script>
// ── CONFIG ────────────────────────────────────────────────
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxAtxqMbGCJ2miR56wSYY9jVMtXLpfdMFwl5Wh3oxnfEFrfxaiz4C3-QxHWj4yNfjJZ/exec';

// ── WEEK ─────────────────────────────────────────────────
const WEEK1 = new Date('2026-05-11T00:00:00+08:00').getTime();
const MS_WK = 7*24*60*60*1000;
function currentWeek(){ return Math.max(1,Math.min(52,Math.floor((Date.now()-WEEK1)/MS_WK)+1)); }
function weekRange(w){
  const s=new Date(WEEK1+(w-1)*MS_WK), e=new Date(s.getTime()+6*24*60*60*1000);
  const d=['日','一','二','三','四','五','六'], f=x=>`${x.getMonth()+1}/${x.getDate()}`;
  return `${f(s)}（${d[s.getDay()]}）— ${f(e)}（${d[e.getDay()]}）`;
}
const WEEK = currentWeek();

// ── ITEMS ─────────────────────────────────────────────────
const CI = [
  {key:'sutra',  icon:'📖',name:'誦經',      unit:'部',  wg:2,yg:108,note:false},
  {key:'vow',    icon:'🙏',name:'發願',      unit:'次',  wg:2,yg:108,note:false},
  {key:'dharma', icon:'💬',name:'甘露法語',  unit:'則',  wg:1,yg:40, note:true, ph:'記下編號、月刊期數或是心得'},
  {key:'reflect',icon:'🪞',name:'反省檢討',  unit:'次',  wg:2,yg:108,note:true, ph:'紀錄反省檢討（以讀誦法語為標準）的身口意三業'},
  {key:'sit',    icon:'🧘',name:'自行靜坐',  unit:'支香',wg:2,yg:84, note:false},
];
const AI = [
  {key:'teaching',icon:'📖',name:'研讀老和尚開示',unit:'篇',  yg:12},
  {key:'service', icon:'📜',name:'法會共修',      unit:'次',  yg:12},
  {key:'temple',  icon:'🧘',name:'精舍/本山靜坐', unit:'支香',yg:24},
  {key:'chores',  icon:'🏃',name:'精舍出坡',      unit:'小時',yg:45},
  {key:'mountain',icon:'⛰️',name:'回山出坡',      unit:'次',  yg:1},
  {key:'retreat', icon:'🏕️',name:'護七護夏',      unit:'天',  yg:0},
  {key:'course',  icon:'🎓',name:'禪修班',         unit:'期',  yg:2},
];

// ── MEMBERS ───────────────────────────────────────────────
const MEMBERS=[
  {seq:1,name:'林上又',dharma:'傳首',pin:'9168'},
  {seq:2,name:'郭旭洲',dharma:'法睿',pin:'6201'},
  {seq:3,name:'陳見福',dharma:'法曠',pin:'6508'},
  {seq:4,name:'蔡昇煌',dharma:'法煥',pin:'9207'},
  {seq:5,name:'陳萬成',dharma:'傳普',pin:'8225'},
  {seq:6,name:'陳龍昌',dharma:'法涑',pin:'6030'},
  {seq:7,name:'陳則誠',dharma:'傳信',pin:'1260'},
  {seq:8,name:'鄭心通',dharma:'傳通',pin:'9420'},
  {seq:9,name:'林建華',dharma:'傳安',pin:'6177'},
  {seq:10,name:'張瑞強',dharma:'傳強',pin:'8493'},
  {seq:11,name:'郭建雄',dharma:'法士',pin:'8999'},
  {seq:12,name:'楊治華',dharma:'法治',pin:'3293'},
  {seq:13,name:'周章欽',dharma:'傳護',pin:'8095'},
  {seq:14,name:'吳宗保',dharma:'法孝',pin:'1185'},
  {seq:15,name:'張湧全',dharma:'法全',pin:'8973'},
  {seq:16,name:'仲惟德',dharma:'傳惟',pin:'6979'},
  {seq:17,name:'褚興邦',dharma:'法主',pin:'1910'},
];

function demoT(){
  const t={};
  [...CI,...AI].forEach(it=>{ t[it.key]=Math.floor(Math.random()*(it.yg||12)*0.55); });
  return t;
}
function demoW(){
  const t={};
  CI.forEach(it=>{ t[it.key]=Math.floor(Math.random()*(it.wg*2+1)); });
  return t;
}
const DEMO=MEMBERS.map(m=>({...m,totals:demoT(),weekTotals:demoW()}));

// ── STATE ─────────────────────────────────────────────────
let currentUser=null, pinBuffer='';
let selections={}, noteTexts={}, weekAccum={}, cumTotals={};
let wallMembers=[];

// ── PAGE NAV ─────────────────────────────────────────────
function showPage(p){
  ['pageWall','pageDetail','pageCheckin'].forEach(id=>{
    document.getElementById(id).style.display='none';
  });
  const target = p==='wall'?'pageWall': p==='detail'?'pageDetail':'pageCheckin';
  document.getElementById(target).style.display='block';
  window.scrollTo(0,0);

  // 浮動按鈕
  const fab  = document.getElementById('fabCheckin');
  const back = document.getElementById('fabBack');
  if(fab)  fab.style.display  = (p==='wall') ? 'flex' : 'none';
  if(back) back.style.display = (p==='checkin') ? 'flex' : 'none';

  if(p==='checkin'&&!currentUser){
    document.getElementById('loginOverlay').classList.remove('hidden');
  } else {
    document.getElementById('loginOverlay').classList.add('hidden');
  }
}

// ── WALL ─────────────────────────────────────────────────
function initWall(){
  document.getElementById('wallWeekChip').textContent='第 '+WEEK+' 週';
  const fab=document.getElementById('fabCheckin');
  if(fab) fab.style.display='flex';
  loadWall();
}

async function loadWall(){
  try{
    const r=await fetch(GAS_URL+'?action=getWall');
    const d=await r.json();
    if(!d.ok) throw new Error(d.msg||'GAS error');
    renderWall(ordered(d.members));
  }catch(e){
    console.error('loadWall 失敗：', e.message||e);
    renderWall(ordered(DEMO)); // 用 Demo 資料備援
  }
}

function ordered(members){
  const a=[...members];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  const last=localStorage.getItem('fuhui_last');
  if(last){const idx=a.findIndex(m=>m.name===last);if(idx>0){const[me]=a.splice(idx,1);a.unshift(me);}}
  return a;
}

function cumPct(totals){
  let s=0; CI.forEach(it=>s+=Math.min(100,Math.round((totals[it.key]||0)/it.yg*100)));
  return Math.round(s/CI.length);
}
function wkPct(wt){
  let s=0; CI.forEach(it=>s+=Math.round((wt[it.key]||0)/it.wg*100));
  return Math.round(s/CI.length);
}

function renderWall(members){
  wallMembers=members;
  const pcts=members.map(m=>cumPct(m.totals||{}));
  const avg=Math.round(pcts.reduce((a,b)=>a+b,0)/pcts.length);
  const circ=289,off=circ-Math.min(100,avg)/100*circ;
  const rc=document.getElementById('groupRingCircle');
  setTimeout(()=>rc.style.strokeDashoffset=off,80);
  rc.style.stroke=avg>=100?'#2e7d4f':'#4a9e6b';
  const rp=document.getElementById('groupRingPct');
  rp.textContent=avg+'%'; rp.className='group-ring-pct'+(avg>=100?' high':'');
  document.getElementById('groupStats').style.display='block';
  document.getElementById('wallQuote').style.display='block';

  const scroll=document.getElementById('wallCards'); scroll.innerHTML='';
  const wrap=document.createElement('div'); wrap.style.cssText='padding:12px 12px 80px';
  members.forEach((m,idx)=>{
    const tot=m.totals||{},wt=m.weekTotals||{};
    const cp=cumPct(tot),wp=wkPct(wt),wb=Math.min(100,wp);
    const dh=m.dharma||m.name;
    const card=document.createElement('div'); card.className='mem-card'; card.onclick=()=>showDetail(idx);
    card.innerHTML=`<div class="mem-head">
      <div class="mem-av">${dh[dh.length-1]}</div>
      <div class="mem-info">
        <div class="mem-name-row"><div class="mem-name">${m.name}</div><div class="mem-dharma">${m.dharma||''}</div></div>
        <div class="mem-week-row">
          <div class="mem-wlbl">本週</div>
          <div class="mem-wbar"><div class="mem-wfill ${wp>=100?'wdone':''}" style="width:${wb}%"></div></div>
          <div class="mem-wpct ${wp>=100?'wdone':''}">${wp}%</div>
        </div>
      </div>
      <div class="mem-right">
        <div class="mem-pct ${cp>=100?'high':''}">${cp}%</div>
        <div class="mem-plbl">累積整體</div>
        <div class="mem-arr">詳細 ›</div>
      </div>
    </div>`;
    wrap.appendChild(card);
  });
  scroll.appendChild(wrap);
}

// ── DETAIL ───────────────────────────────────────────────
function showDetail(idx){
  const m=wallMembers[idx],tot=m.totals||{},wt=m.weekTotals||{};
  const cp=cumPct(tot),wp=wkPct(wt);
  const dh=m.dharma||m.name;
  document.getElementById('detailAv').textContent=dh[dh.length-1];
  document.getElementById('detailName').textContent=m.name;
  document.getElementById('detailDharma').textContent='法名：'+(m.dharma||'');
  document.getElementById('detailWeekChip').textContent='第 '+WEEK+' 週';
  const cpe=document.getElementById('detailCumPct'); cpe.textContent=cp+'%'; cpe.className='detail-cpct'+(cp>=100?' high':'');
  const wpe=document.getElementById('detailWkPct'); wpe.textContent=wp+'%'; wpe.className='detail-wpct'+(wp>=100?' wdone':'');

  const cg=document.getElementById('detailCheckinGrid'); cg.innerHTML='';
  CI.forEach(it=>{
    const got=tot[it.key]||0,p=Math.min(100,Math.round(got/it.yg*100));
    const wGot=wt[it.key]||0,wP=Math.round(wGot/it.wg*100);
    const c=document.createElement('div'); c.className='d-cell';
    c.innerHTML=`<div class="d-top"><span class="d-name">${it.icon} ${it.name}</span><span class="d-pct ${p>=100?'full':''}">${p}%</span></div>
    <div class="d-bar"><div class="d-bfill ${p>=100?'full':''}" style="width:${p}%"></div></div>
    <div class="d-count">${got} / ${it.yg} ${it.unit}</div>
    <div class="d-wk ${wP>=100?'wdone':''}">本週 ${wP}%・${wGot}${it.unit}</div>`;
    cg.appendChild(c);
  });

  const ag=document.getElementById('detailAdminGrid'); ag.innerHTML='';
  AI.forEach(it=>{
    const got=tot[it.key]||0,p=it.yg>0?Math.min(100,Math.round(got/it.yg*100)):0;
    const c=document.createElement('div'); c.className='d-cell';
    c.innerHTML=`<div class="d-top"><span class="d-name">${it.icon} ${it.name}</span><span class="d-pct adm">${it.yg>0?p+'%':'累積'}</span></div>
    <div class="d-bar"><div class="d-bfill adm" style="width:${p}%"></div></div>
    <div class="d-count">${got}${it.yg>0?' / '+it.yg:''} ${it.unit}</div>`;
    ag.appendChild(c);
  });

  // 統一用 style.display 切換頁面，確保立刻出現
  document.getElementById('pageWall').style.display='none';
  document.getElementById('pageCheckin').style.display='none';
  document.getElementById('pageDetail').style.display='block';
  window.scrollTo(0,0);
  document.getElementById('pageDetail').querySelector('.detail-scroll').scrollTop=0;
  // FAB 控制
  const fabD=document.getElementById('fabCheckin');
  const backD=document.getElementById('fabBack');
  if(fabD) fabD.style.display='none';
  if(backD) backD.style.display='none';

  // 載入備註記錄
  const notesWrap=document.getElementById('detailNotes');
  notesWrap.innerHTML='<div class="notes-loading">載入備註中…</div>';
  loadNotes(m.pin||'', notesWrap);
}
async function loadNotes(pin, wrap){
  if(!pin || !GAS_URL || GAS_URL.indexOf('YOUR_GAS')!==-1){
    wrap.innerHTML=''; return;
  }
  try{
    const r=await fetch(`${GAS_URL}?action=getNotes&pin=${pin}`);
    const d=await r.json();
    if(!d.ok||!d.notes||d.notes.length===0){
      wrap.innerHTML='<div class="notes-empty">尚無備註記錄</div>';
      return;
    }
    let html='';
    d.notes.forEach(n=>{
      const icon = n.type==='dharma' ? '💬' : '🪞';
      const label= n.type==='dharma' ? '甘露法語' : '反省檢討';
      html+=`<div class="note-item">
        <div class="note-meta">
          <span class="note-icon">${icon}</span>
          <span class="note-label">${label}</span>
          <span class="note-date">第${n.week}週・${n.date}</span>
        </div>
        <div class="note-text">${n.text}</div>
      </div>`;
    });
    wrap.innerHTML=html;
  }catch(e){
    wrap.innerHTML='<div class="notes-empty">備註載入失敗</div>';
  }
}

function closeDetail(){
  document.getElementById('pageDetail').style.display='none';
  document.getElementById('pageWall').style.display='block';
  window.scrollTo(0,0);
  const fab=document.getElementById('fabCheckin');
  if(fab) fab.style.display='flex';
}

// ── LOGIN ─────────────────────────────────────────────────
function onPinInput(el){
  let val=el.value.replace(/\D/g,'').slice(0,4);
  el.value=val; pinBuffer=val;
  document.getElementById('loginErr').textContent='';
  const btn=document.getElementById('pinLoginBtn');
  const ready=val.length===4;
  btn.disabled=!ready;
  btn.className='pin-login-btn'+(ready?' ready':'');
}
function updateDots(){} // 保留空函式避免其他地方呼叫報錯
async function doLoginBtn(){
  if(pinBuffer.length!==4) return;
  tryLogin();
}
async function tryLogin(){
  const localMember = MEMBERS.find(m=>m.pin===pinBuffer);
  if(!localMember){
    document.getElementById('loginErr').textContent='PIN 碼錯誤，請重新輸入';
    pinBuffer=''; updateDots(); return;
  }

  currentUser = {name:localMember.name, dharma:localMember.dharma, seq:localMember.seq, pin:pinBuffer};
  localStorage.setItem('fuhui_last', currentUser.name);

  // 先用本地資料立即顯示
  loadLocalData();
  doLogin();

  // 登入時從 GAS 同步一次（背景，不影響操作）
  // 注意：只在登入時同步，提交後不再同步，避免覆蓋最新資料
  syncFromGAS();
}

function loadLocalData(){
  const raw = localStorage.getItem('fuhui_'+currentUser.name);
  if(raw){
    const s = JSON.parse(raw);
    // 新的一週：weekAccum 歸零，cumTotals 保留
    weekAccum = s.week===WEEK ? (s.weekAccum||{}) : {};
    cumTotals = s.cumTotals||{};
  } else {
    weekAccum={}; cumTotals={};
  }
}

let isSyncing = false;

// 登入時同步 GAS 資料
async function syncFromGAS(){
  if(!GAS_URL || GAS_URL.indexOf('YOUR_GAS')!==-1) return;
  if(!currentUser || !currentUser.pin) return;
  isSyncing = true;
  updateSubmitBtn(); // 同步中禁用提交
  try{
    const r = await fetch(`${GAS_URL}?action=getMyData&pin=${currentUser.pin}`);
    const d = await r.json();
    if(!d.ok) return;

    // GAS 是唯一真相，直接覆蓋本地（管理員修正才會生效）
    weekAccum = d.weekAccum||{};
    cumTotals  = d.cumTotals||{};
    const AI_KEYS=['teaching','service','temple','chores','mountain','retreat','course'];
    AI_KEYS.forEach(k=>{ cumTotals[k] = (d.cumTotals||{})[k]||0; });

    saveLocal();
    CI.forEach(it=>refreshCard(it.key));
    buildAdminItems();
    updateOverall();
  }catch(e){
    console.log('GAS 同步失敗，使用本地資料');
  } finally {
    isSyncing = false;
    updateSubmitBtn(); // 同步完成，恢復提交
  }
}
function saveLocal(){
  localStorage.setItem('fuhui_'+currentUser.name,JSON.stringify({week:WEEK,weekAccum,cumTotals}));
}
function doLogin(){
  document.getElementById('loginOverlay').classList.add('hidden');
  const dh=currentUser.dharma||currentUser.name;
  document.getElementById('userAv').textContent=dh[dh.length-1];
  document.getElementById('userName').textContent=currentUser.name;
  document.getElementById('userDharma').textContent='法名：'+(currentUser.dharma||'');
  document.getElementById('checkinWeekLbl').textContent='第 '+WEEK+' 週';
  document.getElementById('checkinWeekRange').textContent=weekRange(WEEK);
  CI.forEach(it=>{selections[it.key]=null;noteTexts[it.key]='';});
  buildCheckin(); CI.forEach(it=>refreshCard(it.key));
  buildAdminItems(); updateOverall(); updateSubmitBtn();
  if(wallMembers.length>0) renderWall(ordered(wallMembers));
}
function logout(){
  currentUser=null; pinBuffer='';
  const inp=document.getElementById('pinInput');
  if(inp) inp.value='';
  const btn=document.getElementById('pinLoginBtn');
  if(btn){btn.disabled=true;btn.className='pin-login-btn';}
  document.getElementById('loginOverlay').classList.add('hidden');
  document.getElementById('loginErr').textContent='';
  CI.forEach(it=>{ selections[it.key]=null; noteTexts[it.key]=''; });
  showPage('wall');
}

// ── BUILD CHECKIN ─────────────────────────────────────────
function buildCheckin(){
  const wrap=document.getElementById('itemsWrap'); wrap.innerHTML='';
  CI.forEach(it=>{
    const card=document.createElement('div');
    card.className='item-card'; card.id='card_'+it.key;
    card.innerHTML=`
      <div class="item-top">
        <div class="item-left">
          <div class="item-icon" id="icon_${it.key}">${it.icon}</div>
          <div><div class="iname">${it.name}</div><div class="ihint">週目標 ${it.wg} ${it.unit}・年 ${it.yg} ${it.unit}</div></div>
        </div>
        <div class="item-right">
          <div class="item-wpct" id="wpct_${it.key}">本週 0%</div>
          <div class="item-wcount" id="wcount_${it.key}">0 / ${it.wg} ${it.unit}</div>
          <div class="item-cpct" id="cpct_${it.key}">累積 0%</div>
        </div>
      </div>
      <div class="item-bar"><div class="bar-bg"><div class="bar-fill" id="bar_${it.key}" style="width:0%"></div></div></div>
      <div class="stepper">
        <button type="button" class="step-btn" id="minus_${it.key}" onclick="step('${it.key}',-1)" disabled>－</button>
        <div class="step-display">
          <div class="step-num" id="snum_${it.key}">0</div>
          <div class="step-unit">${it.unit} / 次</div>
        </div>
        <button type="button" class="step-btn" onclick="step('${it.key}',+1)">＋</button>
      </div>
      ${it.note?`<div class="item-note"><textarea id="note_${it.key}" rows="2" placeholder="${it.ph}" oninput="noteTexts['${it.key}']=this.value"></textarea></div>`:''}
      ${it.key==='vow'?`
      <div class="vow-ref">
        <div class="vow-ref-toggle" onclick="toggleVowRef(this)">
          <span>發願參考 ▾</span>
        </div>
        <div class="vow-ref-body" style="display:none">
          <div class="vow-item">
            <div class="vow-title">四弘誓願 <span class="vow-count">三遍為一次</span></div>
            <div class="vow-text">眾生無邊誓願度，煩惱無盡誓願斷，法門無量誓願學，佛道無上誓願成。</div>
          </div>
          <div class="vow-item">
            <div class="vow-title">普賢菩薩十大願王 <span class="vow-count">一遍為一次</span></div>
            <div class="vow-text">一者、禮敬諸佛；二者、稱讚如來；三者、廣修供養；四者、懺悔業障；五者、隨喜功德；六者、請轉法輪；七者、請佛住世；八者、常隨佛學；九者、恆順眾生；十者、普皆迴向。</div>
          </div>
        </div>
      </div>`:''}
      <div class="item-fb">
        <div class="fb-msg" id="fb_${it.key}"></div>
        <div class="fb-accum" id="accum_${it.key}">本週累積：0 ${it.unit}</div>
      </div>`;
    wrap.appendChild(card);
  });
}

function buildAdminItems(){
  const wrap=document.getElementById('advItemsWrap'); wrap.innerHTML='';
  AI.forEach(it=>{
    const got=cumTotals[it.key]||0;
    const p=it.yg>0?Math.min(100,Math.round(got/it.yg*100)):0;
    const div=document.createElement('div'); div.className='adv-item';
    div.innerHTML=`
      <div class="adv-left">
        <div class="adv-name">${it.icon} ${it.name}</div>
        <div class="adv-sub">${got}${it.yg>0?' / '+it.yg:''} ${it.unit}${it.yg>0?'・累積 '+p+'%':''}</div>
        ${it.yg>0?`<div class="adv-bar"><div class="adv-bfill" style="width:${p}%"></div></div>`:''}
      </div>
      <div class="adv-val">${got>0?got+' '+it.unit:'—'}</div>`;
    wrap.appendChild(div);
  });
}

function toggleVowRef(el){
  const body=el.nextElementSibling;
  const open=body.style.display==='none';
  body.style.display=open?'block':'none';
  el.querySelector('span').textContent=open?'發願參考 ▴':'發願參考 ▾';
}

// ── STEPPER ───────────────────────────────────────────────
function step(key,delta){
  const cur=selections[key]||0, next=Math.max(0,cur+delta);
  selections[key]=next===0?null:next;
  refreshCard(key); updateSubmitBtn(); updateOverall();
}

function refreshCard(key){
  const it=CI.find(i=>i.key===key);
  const sel=selections[key]||0, wk=(weekAccum[key]||0)+sel;
  const wPct=Math.round(wk/it.wg*100), wBar=Math.min(100,wPct), done=wk>=it.wg;
  const cumVal=(cumTotals[key]||0)+sel, cPct=Math.round(cumVal/it.yg*100);

  const sn=document.getElementById('snum_'+key);
  sn.textContent=sel; sn.className='step-num'+(sel===0?'':(done?' done':' has'));
  document.getElementById('minus_'+key).disabled=sel===0;

  const bar=document.getElementById('bar_'+key);
  bar.style.width=wBar+'%'; bar.className='bar-fill'+(done?' full':'');

  const wp=document.getElementById('wpct_'+key);
  wp.textContent='本週 '+wPct+'%'; wp.className='item-wpct'+(done?' full':'');
  document.getElementById('wcount_'+key).textContent=wk+' / '+it.wg+' '+it.unit;

  const cp=document.getElementById('cpct_'+key);
  cp.textContent='累積 '+cPct+'%（'+cumVal+'/'+it.yg+it.unit+'）';
  cp.className='item-cpct'+(cPct>=100?' ahead':'');

  document.getElementById('card_'+key).className='item-card'+(done?' done-card':'');
  document.getElementById('icon_'+key).className='item-icon'+(done?' done':'');

  const fb=document.getElementById('fb_'+key);
  if(sel>0){fb.textContent=done?'本週圓滿 ✓':'本次 '+sel+' '+it.unit;fb.classList.add('show');}
  else{fb.textContent='';fb.classList.remove('show');}
  document.getElementById('accum_'+key).textContent='本週累積：'+wk+' '+it.unit;
}

function updateOverall(){
  let cs=0,ws=0;
  CI.forEach(it=>{
    const sel=selections[it.key]||0;
    cs+=Math.min(100,Math.round(((cumTotals[it.key]||0)+sel)/it.yg*100));
    ws+=Math.round(((weekAccum[it.key]||0)+sel)/it.wg*100);
  });
  const co=Math.round(cs/CI.length), wo=Math.round(ws/CI.length);
  document.getElementById('cumulFill').style.width=co+'%';
  document.getElementById('cumulPct').textContent=co+'%';
  document.getElementById('weekFill').style.width=Math.min(100,wo)+'%';
  document.getElementById('weekPctOverall').textContent=wo+'%';
}

function updateSubmitBtn(){
  const btn=document.getElementById('submitBtn');
  if(!btn) return;
  const has=Object.keys(selections).some(k=> selections[k]!==null && selections[k]>0);
  const canSubmit = has && !isSyncing;
  btn.disabled=!canSubmit;
  btn.className='submit-btn'+(canSubmit?' active':'');
  btn.textContent = isSyncing ? '同步中…' : '提交進度';
}

function clearLocalData(){
  if(!confirm('確定清除本機暫存資料？\n（雲端資料不受影響）')) return;
  // 清除所有 fuhui_ 開頭的 localStorage
  const keys=[];
  for(let i=0;i<localStorage.length;i++){
    if(localStorage.key(i).startsWith('fuhui_')) keys.push(localStorage.key(i));
  }
  keys.forEach(k=>localStorage.removeItem(k));
  // 重置畫面
  weekAccum={}; cumTotals={};
  CI.forEach(it=>{ selections[it.key]=null; noteTexts[it.key]=''; });
  buildCheckin();
  CI.forEach(it=>refreshCard(it.key));
  updateOverall(); updateSubmitBtn();
  showToast('本機暫存已清除 ✓');
}

// ── SUBMIT ────────────────────────────────────────────────
async function submitRecord(){
  // 安全檢查
  if(!currentUser){ showToast('請先登入'); return; }

  const body={action:'submit', pin:currentUser.pin};
  CI.forEach(it=>{
    body[it.key]=selections[it.key]||0;
    if(it.note) body[it.key+'_note']=noteTexts[it.key]||'';
  });

  // 先更新本地狀態
  CI.forEach(it=>{
    const sel=selections[it.key]||0;
    if(sel>0){
      weekAccum[it.key]=(weekAccum[it.key]||0)+sel;
      cumTotals[it.key]=(cumTotals[it.key]||0)+sel;
    }
    selections[it.key]=null;
    if(it.note){
      noteTexts[it.key]='';
      const el=document.getElementById('note_'+it.key);
      if(el) el.value='';
    }
  });

  saveLocal();
  CI.forEach(it=>refreshCard(it.key));
  updateSubmitBtn();
  updateOverall();
  showToast('已提交進度 🙏');

  // 提交後重新載入功德榜（同步顯示）
  loadWall();

  // 非同步送 GAS（用 GET 避免 CORS）
  if(GAS_URL && GAS_URL.indexOf('YOUR_GAS')===-1){
    try{
      const params=new URLSearchParams({action:'submit', pin:currentUser.pin});
      CI.forEach(it=>{
        params.set(it.key, body[it.key]||0);
        if(it.note) params.set(it.key+'_note', body[it.key+'_note']||'');
      });
      await fetch(GAS_URL+'?'+params.toString());
    }catch(e){
      console.log('GAS 連線失敗，資料已存本地');
    }
  }
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

initWall();
</script>
